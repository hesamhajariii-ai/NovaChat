<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>NovaChat</title>
<style>
body{margin:0;background:#111b21;color:white;font-family:tahoma}
.header{background:#202c33;padding:18px;font-size:30px}
.chat{display:flex;align-items:center;padding:45px;border-bottom:1px solid #2a3942}
a{color:white;text-decoration:none}
.avatar{width:100px;height:100px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;margin-left:12px}
.info{flex:1}
.last{color:#aaa;font-size:30px}
.time{font-size:22px!important;color:#aaa;font-size:12px}
</style>
</head>
<body>
<div class="header">NovaChat</div>

{% for chat in chats %}
<a href="/chat/{{chat.username}}?user={{user}}">
<div class="chat">
<div class="avatar">{{chat.username[0]|upper}}</div>
<div class="info">
<div style="font-size:35px;font-weight:bold;">{{chat.username}}</div>
<div class="last">{{chat.message}}</div>
</div>
<div class="time">{{chat.time}}</div>
</div>
</a>
{% endfor %}

</body>
</html>
