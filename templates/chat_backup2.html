<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaChat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:tahoma;
}

body{
    height:100vh;
    background:#efeae2;
}

.container{
    display:flex;
    height:100vh;
}

.sidebar{
    width:330px;
    background:#111b21;
    color:white;
    overflow-y:auto;
}

.profile{
    height:70px;
    padding:20px;
    background:#202c33;
    display:flex;
    align-items:center;
    font-size:20px;
}

.avatar{
    width:45px;
    height:45px;
    border-radius:50%;
    background:#00a884;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:12px;
    font-weight:bold;
}

.user{
    padding:20px;
    display:flex;
    align-items:center;
    cursor:pointer;
    border-bottom:1px solid #2a3942;
}

.user:hover{
    background:#202c33;
}

.user.active{
    background:#005c4b;
}

.user-info{
    display:flex;
    flex-direction:column;
}

.username{
    font-size:20px;
}

.last{
    font-size:12px;
    color:#aaa;
    margin-top:5px;
}

.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    height:70px;
    background:#202c33;
    color:white;
    display:flex;
    align-items:center;
    padding:20px;
    font-size:22px;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    padding:10px;
    border-radius:10px;
    max-width:70%;
}

.me{
    background:#d9fdd3;
    align-self:flex-end;
}

.other{
    background:white;
    align-self:flex-start;
}

.time{
    font-size:11px;
    color:#777;
    margin-top:5px;
}

.bottom{
    display:flex;
    gap:10px;
    padding:10px;
    background:#f0f2f5;
}

.bottom input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.bottom button{
    background:#00a884;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="profile">

<div class="avatar">
N
</div>

NovaChat

</div>


{% for user in users %}

<div class="user"
onclick="selectUser('{{ user }}',this)">

<div class="avatar">
{{ user[0]|upper }}
</div>

<div class="user-info">

<div class="username">
{{ user }}
</div>

<div class="last">
آخرین پیام
</div>

</div>

</div>

{% endfor %}</div>


<div class="chat">


<div class="header" id="chatTitle">

چت با {{ receiver }}

</div>


<div class="messages" id="messages">

</div>



<div class="bottom">

<input 
id="message"
placeholder="پیام..."
onkeydown="if(event.key==='Enter')sendMessage()">


<button onclick="sendMessage()">
ارسال
</button>


</div>


</div>


</div>



<script>


let currentUser="{{ user }}";
let targetUser="{{ receiver }}";



function selectUser(user,element){


document.querySelectorAll(".user")
.forEach(x=>x.classList.remove("active"));


element.classList.add("active");


targetUser=user;


document.getElementById("chatTitle").innerText=
"چت با "+user;


loadMessages();


}




async function loadMessages(){


if(!targetUser)
return;


try{


let res=await fetch(
`/messages?user1=${currentUser}&user2=${targetUser}`
);


let data=await res.json();


let box=document.getElementById("messages");


box.innerHTML="";


data.forEach(msg=>{


let div=document.createElement("div");


div.className =
"msg "+(msg.sender==currentUser ? "me":"other");



div.innerHTML=`

<div>${msg.message}</div>

<div class="time">
${msg.time || ""}
</div>

`;



box.appendChild(div);


});



box.scrollTop=box.scrollHeight;


}catch(e){

console.log(e);

}


}




async function sendMessage(){

let input=document.getElementById("message");
let text=input.value.trim();

if(!text || !targetUser)
return;

await fetch("/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
 sender:currentUser,
 receiver:targetUser,
 message:text
})
});

input.value="";
loadMessages();

}

window.onload=function(){loadMessages();};

</script>


</body>

</html>
